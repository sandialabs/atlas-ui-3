# ATLAS telemetry stack for OpenShift.
#
# SECURITY POSTURE (read before `oc apply`):
#   * Grafana is configured to require a password (see the `grafana` Secret
#     below). Anonymous admin is OFF by default. For a quick local-dev
#     preview, see the commented ANONYMOUS_DEV_ONLY block further down.
#   * The OTEL Collector → Tempo gRPC hop is cluster-internal and uses
#     `tls: insecure: true`. This is acceptable ONLY when the two pods sit
#     inside the same namespace on an SDN with pod-to-pod isolation. For
#     cross-namespace or cross-cluster traffic, switch to mTLS via a
#     service mesh (e.g. Red Hat Service Mesh / Istio) or Tempo's native
#     TLS options.
#   * Span attributes emitted by ATLAS contain sanitized previews and
#     keyed hashes (HMAC) of user identifiers — never raw prompts, tool
#     arguments, tool outputs, or RAG document text. Even so, treat this
#     data as sensitive: restrict Grafana access to the team that should
#     see audit traces.
apiVersion: v1
kind: Namespace
metadata:
  name: atlas-telemetry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: atlas-telemetry
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlp/tempo:
        endpoint: tempo.atlas-telemetry.svc:4317
        # Pod-to-pod within atlas-telemetry namespace only. Do not expose
        # this collector outside the namespace without switching to mTLS.
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: atlas-telemetry
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: atlas-telemetry
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.atlas-telemetry.svc:3200
        isDefault: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-storage
  namespace: atlas-telemetry
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: atlas-telemetry
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: atlas-telemetry
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: atlas-telemetry
spec:
  replicas: 1
  selector:
    matchLabels: { app: tempo }
  template:
    metadata:
      labels: { app: tempo }
    spec:
      # fsGroup is left unset so the restricted-v2 SCC admission controller
      # assigns one from the namespace range — hardcoding a value would be
      # rejected unless the service account has the anyuid SCC.
      containers:
        - name: tempo
          image: grafana/tempo:latest
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - { name: query, containerPort: 3200 }
            - { name: otlp-grpc, containerPort: 4317 }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data, mountPath: /var/tempo }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: tempo-config }
        - name: data
          persistentVolumeClaim: { claimName: tempo-storage }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: atlas-telemetry
spec:
  selector: { app: tempo }
  ports:
    - { name: query, port: 3200, targetPort: 3200 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
---
# Grafana admin credentials. Replace the placeholder with a strong password
# before `oc apply`, or generate one with:
#   oc -n atlas-telemetry create secret generic grafana-admin \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password="$(openssl rand -base64 24)"
# and delete this Secret manifest.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: atlas-telemetry
type: Opaque
stringData:
  admin-user: admin
  admin-password: CHANGE_ME_BEFORE_APPLYING
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: atlas-telemetry
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            # Authenticated-by-default. Anonymous admin is NEVER safe outside
            # a personal laptop — leaving it on exposes the full audit trail
            # (tool names, user hashes, doc_ids) to anyone who can reach the
            # Route.
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_AUTH_DISABLE_LOGIN_FORM, value: "false" }
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            # --- ANONYMOUS_DEV_ONLY ---------------------------------------
            # For a quick local-dev preview ONLY (single-user laptop, no
            # data classified above Public), uncomment these three lines
            # AND delete the GF_SECURITY_ADMIN_* env entries above:
            # - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            # - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            # - { name: GF_AUTH_DISABLE_LOGIN_FORM, value: "true" }
            # -------------------------------------------------------------
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: atlas-telemetry
spec:
  selector: { app: grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: atlas-telemetry
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
